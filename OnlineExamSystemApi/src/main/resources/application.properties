server.port=9201
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.url=jdbc:mysql://localhost:3306/online_exam?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
mybatis.configuration.mapUnderscoreToCamelCase=true
logging.level.com.rabbiter.oes.mapper=warn

# AI Configuration - 硅基流动(SiliconFlow)
# 使用 DeepSeek-R1-Distill-Qwen-7B 模型 - 免费、高质量、中文友好
ai.api.url=https://api.siliconflow.cn/v1/chat/completions
ai.api.key=your_api_key_here
ai.model=deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
ai.max.tokens=1000
ai.temperature=0.7

# 讯飞星火额外配置
ai.spark.appid=your_appid_here
ai.spark.apikey=your_spark_apikey_here
